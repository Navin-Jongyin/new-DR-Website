<script>
    (function () {
        let tableData = [];

        const filterState = { theme: "", type: "", country: "", market: "", div: "", session: "" };

        const typeLabelMap = {
            onstock: "DR on Stock",
            etf: "ETF",
            onetf: "ETF"
        };

        const tbody = document.getElementById('dr-table-body');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');

        // Helper: Standardized Percentage Formatting
        const formatPct = (val) => {
            if (val === null || val === undefined || val === "-") return "-";
            const num = parseFloat(val);
            return isNaN(num) ? "-" : (num > 0 ? `+${num.toFixed(2)}%` : `${num.toFixed(2)}%`);
        };

        const getFlag = (country) => {
            const map = { us: 'us', hk: 'hk', vn: 'vn', cn: 'cn', ind: 'ind', jp: 'jp', fr: 'fr', nl: 'nl' };
            return map[(country || '').toLowerCase()] || 'us';
        };

        const getCountryName = (country) => {
            const map = { us: "สหรัฐอเมริกา", hk: "ฮ่องกง", vn: "เวียดนาม", cn: "จีน", ind: "อินเดีย", jp: "ญี่ปุ่น", fr: "ฝรั่งเศส", nl: "เนเธอร์แลนด์" };
            return map[(country || '').toLowerCase()] || "อื่นๆ";
        }
        const getChangeColor = (val) => {
            if (!val || val === '-') return '#353945';
            return val.includes('+') ? '#00B16A' : (val.includes('-') ? '#D92D20' : '#353945');
        };

        // --- Dropdown Controller ---
        function setupDropdown(id, stateKey) {
            const dropdown = document.getElementById(id);
            const trigger = dropdown.querySelector('.dropdown-trigger');
            const optionsContainer = dropdown.querySelector('.dropdown-options');

            // Replace broken img with SVG Arrow
            trigger.innerHTML = `<span>ทั้งหมด</span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
            const label = trigger.querySelector('span');

            trigger.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.dropdown-options').forEach(el => { if (el !== optionsContainer) el.classList.remove('show'); });
                optionsContainer.classList.toggle('show');
            };

            const updateOptions = (optionsArray) => {
                optionsContainer.innerHTML = '<div class="dropdown-option selected" data-val="">ทั้งหมด</div>';
                optionsArray.forEach(opt => {
                    if (!opt) return;
                    const el = document.createElement('div');
                    el.className = 'dropdown-option';
                    el.textContent = opt;
                    el.onclick = () => select(opt);
                    optionsContainer.appendChild(el);
                });
                optionsContainer.querySelector('.dropdown-option').onclick = () => select("");
            };

            const select = (val) => {
                filterState[stateKey] = val;
                label.textContent = val || "ทั้งหมด";
                optionsContainer.classList.remove('show');
                optionsContainer.querySelectorAll('.dropdown-option').forEach(el => el.classList.toggle('selected', (el.textContent === (val || "ทั้งหมด"))));
                render();
            };

            return { updateOptions, reset: () => select("") };
        }

        const ctrls = {
            type: setupDropdown('typeDropdown', 'type'),
            country: setupDropdown('countryDropdown', 'country'),
            market: setupDropdown('marketDropdown', 'market'),
            theme: setupDropdown('themeDropdown', 'theme'),
            div: setupDropdown('divDropdown', 'div'),
            session: setupDropdown('sessionDropdown', 'session')
        };

        async function fetchData() {
            try {
                tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:40px;">กำลังโหลดข้อมูล...</td></tr>';
                const response = await fetch('https://investmentstation.bualuang.co.th/data_DRweb.php');
                const rawData = await response.json();

                tableData = rawData.map(item => ({
                    symbol: item.Symbol,
                    asset: item.UL,
                    price: (typeof item.Last_price === 'number') ? item.Last_price.toLocaleString(undefined, { maximumFractionDigits: 2 }) : '-',
                    change: formatPct(item["Change%_1D"]),
                    change1m: formatPct(item["Change%_1M"]),
                    change3m: formatPct(item["Change%_3M"]),
                    change6m: formatPct(item["Change%_6M"]),
                    ytd: formatPct(item["Change%_YTD"]),
                    market: item.Exchange,
                    theme: item.Theme || "Other",
                    type: typeLabelMap[(item.Type || '').toLowerCase()] || "DR on Stock",
                    country: getCountryName(item.Country),
                    ratio: `1 : ${item.Ratio}`,
                    cap: (typeof item.Marketcap === 'number') ? (item.Marketcap / 1000000).toLocaleString(undefined, { maximumFractionDigits: 0 }) : '-',
                    div: item.Dividend_Record === "Record" ? "จ่าย" : "ไม่จ่าย",
                    session: item.Trading_session,
                    flag: getFlag(item.Country)
                }));

                ctrls.type.updateOptions(["DR on Stock", "ETF"]);
                ctrls.country.updateOptions([...new Set(tableData.map(i => i.country))].sort());
                ctrls.market.updateOptions([...new Set(tableData.map(i => i.market))].sort());
                ctrls.theme.updateOptions([...new Set(tableData.map(i => i.theme))].sort());
                ctrls.div.updateOptions(["จ่าย", "ไม่จ่าย"]);
                ctrls.session.updateOptions(["Day", "Day and Night"]);

                render();
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:40px;color:red;">ไม่สามารถเข้าถึงข้อมูลได้ (Network Error)</td></tr>';
            }
        }

        function render() {
            const search = searchInput.value.trim().toUpperCase();
            const filtered = tableData.filter(i =>
                (!search || i.symbol.includes(search)) &&
                (!filterState.theme || i.theme === filterState.theme) &&
                (!filterState.type || i.type === filterState.type) &&
                (!filterState.country || i.country === filterState.country) &&
                (!filterState.market || i.market === filterState.market) &&
                (!filterState.div || i.div === filterState.div) &&
                (!filterState.session || i.session === filterState.session)
            );

            tbody.innerHTML = filtered.map((item, idx) => {
                const bgColor = idx % 2 === 0 ? '#FFFFFF' : '#F4F5F6';
                const cell = `padding: 12px 16px; font-size: 14px; color: #141416; border-bottom: 1px solid #E6E8ED; vertical-align: middle; white-space: nowrap; text-align: left;`;
                const sticky = `position: sticky; left: 0; z-index: 5; background-color: ${bgColor}; border-right: 1px solid #E6E8ED; font-weight: 700;`;

                return `
                    <tr style="background-color: ${bgColor};">
                        <td style="${cell} ${sticky}">
                            <div style="display:flex; align-items:center; gap:12px; justify-content: flex-start;">
                                <span class="dr-flag-icon flag-${item.flag}"></span>
                                          <span onclick="window.openDrLink('${item.symbol}')"
                                   style="text-decoration:none; color:#1E90FF; cursor:pointer;">${item.symbol}</span>
                            </div>
                        </td>
                        <td style="${cell}">${item.asset}</td>
                        <td style="${cell} text-align:right;">${item.price}</td>
                        <td style="${cell} text-align:right; color:${getChangeColor(item.change)};">${item.change}</td>
                        <td style="${cell} text-align:right; color:${getChangeColor(item.change1m)};">${item.change1m}</td>
                        <td style="${cell} text-align:right; color:${getChangeColor(item.change3m)};">${item.change3m}</td>
                        <td style="${cell} text-align:right; color:${getChangeColor(item.change6m)};">${item.change6m}</td>
                        <td style="${cell} text-align:right; color:${getChangeColor(item.ytd)};">${item.ytd}</td>
                        <td style="${cell}">${item.market}</td>
                        <td style="${cell} text-align:right;">${item.ratio}</td>
                        <td style="${cell} text-align:right;">${item.cap}</td>
                        <td style="${cell} text-align:center;">${item.div}</td>
                        <td style="${cell}">${item.session}</td>
                    </tr>`;
            }).join('') || '<tr><td colspan="13" style="text-align:center;padding:24px;">ไม่พบข้อมูล</td></tr>';
        }

        window.openDrLink = function (symbol) {
            const url = `https://bualuang.co.th/financial-service/inav-lists/dr/dr01-inav/${symbol}`;
            window.location.href = url;
        };

        // Global events
        document.addEventListener('click', () => document.querySelectorAll('.dropdown-options').forEach(el => el.classList.remove('show')));

        clearBtn.onclick = () => {
            searchInput.value = '';
            Object.values(ctrls).forEach(c => c.reset());
        };

        searchInput.oninput = render;

        fetchData();
    })();
</script>
