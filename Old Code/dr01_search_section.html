            if (symbol === 'JAPAN10001') return { market: 'TSE', flag: 'jp', asset: 'Hang Seng Japan TOPIX 100 ETF', country: 'ญี่ปุ่น', type: 'DR on ETF' };
            if (['CN01', 'STAR5001'].includes(symbol)) return { market: 'China', flag: 'cn', asset: 'China ETF', country: 'จีน', type: 'DR on ETF' };

            const hkList = ['BABA01', 'BIDU01', 'BYDCOM01', 'BILIBILI01', 'CATL01', 'CNTECH01', 'HK01', 'HKCE01', 'KUAISHO01', 'PINGAN01', 'SMIC01', 'TENCENT01', 'XIAOMI01'];
            if (hkList.includes(symbol)) {
                const isEtf = ['CNTECH01', 'HK01', 'HKCE01'].includes(symbol);
                return {
                    market: 'HKEX',
                    flag: 'hk',
                    asset: symbol.replace('01', '') + ' (HK)',
                    country: 'ฮ่องกง',
                    type: isEtf ? 'DR on ETF' : 'DR on STOCK'
                };
            }

            // Default US
            const isEtfUS = ['NDX01', 'SP50001'].includes(symbol);
            // Simple logic for NYSE vs Nasdaq based on common knowledge or default to Nasdaq
            const nyseList = ['CRM01', 'ISRG01', 'ORCL01', 'PLTR01', 'TSLA01', 'BABA01']; // Adjust as needed
            const market = nyseList.includes(symbol) ? 'NYSE' : 'Nasdaq';

            return {
                market: market,
                flag: 'us',
                asset: symbol.replace('01', '') + ' Inc.',
                country: 'สหรัฐอเมริกา',
                type: isEtfUS ? 'DR on ETF' : 'DR on STOCK'
            };
        }

        // Generate full table data
        const tableData = orderedSymbols.map((symbol, index) => {
            const info = getSymbolInfo(symbol);
            return {
                symbol: symbol,
                asset: info.asset,
                price: '-',
                change: '-',
                change1m: '-',
                change3m: '-',
                change6m: '-',
                ytd: '-',
                market: info.market,
                ytd: '-',
                market: info.market,
                theme: symbolThemeMap[symbol] || "Other",
                type: info.type,
                country: info.country,
                ratio: '1 : 1000',
                cap: '-',
                div: 'จ่าย', // Default assumption
                session: '10:00 - 16:30',
                flag: info.flag
            };
        });

        // Override with specific data where we have it
        const overrides = {
            'TSLA01': { price: '124.28', change: '-12.24%', change1m: '-5.4%', change3m: '+10.2%', change6m: '-8.5%', ytd: '-12.2%' },
            'BABA01': { price: '88.09', change: '+1.35%', change1m: '+4.2%', change3m: '-2.1%', change6m: '+5.5%', ytd: '+1.3%' },
            'TENCENT01': { price: '334.00', change: '+3.35%', change1m: '+8.1%', change3m: '+12.5%', change6m: '+15.2%', ytd: '+3.3%' },
            'NDX01': { price: '20.87', change: '+0.25%', change1m: '+1.5%', change3m: '+4.8%', change6m: '+9.2%', ytd: '+0.2%' },
            'SP50001': { price: '18.55', change: '-0.12%', change1m: '-0.5%', change3m: '+2.1%', change6m: '+4.5%', ytd: '-0.1%' },
            'CN01': { price: '27.40', change: '+0.88%', change1m: '+3.2%', change3m: '-1.5%', change6m: '+2.8%', ytd: '+0.8%' },
            'HK01': { price: '14.80', change: '-0.05%', change1m: '-1.2%', change3m: '-3.5%', change6m: '-2.1%', ytd: '-0.0%' },
            'MSFT01': { price: '239.82', change: '-44.60%', change1m: '-5.2%', change3m: '-8.5%', change6m: '-12.1%', ytd: '-44.6%' },
            'NVDA01': { price: '148.59', change: '+0.08%', change1m: '+12.5%', change3m: '+25.4%', change6m: '+45.2%', ytd: '+0.1%' },
            'E1VFVN3001': { price: '18.50', change: '+1.25%', change1m: '+2.1%', change3m: '+5.4%', change6m: '+8.2%', ytd: '+1.2%' },
            'AAPL01': { asset: 'Apple Inc.', change1m: '+2.5%', change3m: '+5.1%', change6m: '+10.2%', ytd: '+1.5%' },
            'AMZN01': { asset: 'Amazon.com Inc.', change1m: '-1.2%', change3m: '+3.5%', change6m: '+6.2%', ytd: '-0.5%' },
            'GOOGL01': { asset: 'Alphabet Inc.', change1m: '+1.8%', change3m: '+4.2%', change6m: '+7.5%', ytd: '+0.8%' },
            'META01': { asset: 'Meta Platforms Inc.', change1m: '+5.5%', change3m: '+15.2%', change6m: '+25.1%', ytd: '+3.5%' },
        };

        tableData.forEach(item => {
            if (overrides[item.symbol]) {
                Object.assign(item, overrides[item.symbol]);
            }
        });

        const tbody = document.getElementById('dr-table-body');
        const searchInput = document.getElementById('searchInput');
        const mainSearchBtn = document.getElementById('mainSearchBtn');
        const clearBtn = document.getElementById('clearBtn');

        const cellStyle = "padding: 12px 16px; font-size: 14px; color: #141416; border-bottom: 1px solid #E6E8ED; vertical-align: middle; white-space: nowrap;";
        const stickyFirstColStyle = "position: sticky; left: 0; z-index: 5; border-right: 1px solid #E6E8ED;";

        // Global State for Filters
        const filterState = {
            theme: "",
            type: "",
            country: "",
            market: "",
            div: ""
        };

        // --- Generic Dropdown Logic ---
        function setupDropdown(id, options, stateKey) {
            const dropdown = document.getElementById(id);
            const trigger = dropdown.querySelector('.dropdown-trigger');
            const optionsContainer = dropdown.querySelector('.dropdown-options');
            const label = trigger.querySelector('span');

            // Populate Options
            // Add "All" option
            const allOption = document.createElement('div');
            allOption.className = 'dropdown-option selected';
            allOption.textContent = 'ทั้งหมด';
            allOption.dataset.value = "";
            optionsContainer.appendChild(allOption);

            options.forEach(opt => {
                const option = document.createElement('div');
                option.className = 'dropdown-option';
                option.textContent = opt;
                option.dataset.value = opt;
                optionsContainer.appendChild(option);
            });

            // Toggle Visibility
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                // Close others
                document.querySelectorAll('.dropdown-options').forEach(el => {
                    if (el !== optionsContainer) el.classList.remove('show');
                });
                optionsContainer.classList.toggle('show');
            });

            // Select Option
            optionsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('dropdown-option')) {
                    const value = e.target.dataset.value;
                    const text = e.target.textContent;

                    filterState[stateKey] = value;
                    label.textContent = text;

                    // Update UI selection
                    dropdown.querySelectorAll('.dropdown-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    e.target.classList.add('selected');

                    optionsContainer.classList.remove('show');
                    render();
                }
            });

            // Close on click outside
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target)) {
                    optionsContainer.classList.remove('show');
                }
            });

            // Return reset helper
            return () => {
                filterState[stateKey] = "";
                label.textContent = 'ทั้งหมด';
                dropdown.querySelectorAll('.dropdown-option').forEach(opt => {
                    opt.classList.remove('selected');
                    if (opt.dataset.value === "") opt.classList.add('selected');
                });
            };
        }

        // Initialize Dropdowns
        const uniqueThemes = [...new Set(Object.values(symbolThemeMap))].sort();
        const resetTheme = setupDropdown('themeDropdown', uniqueThemes, 'theme');
        const resetType = setupDropdown('typeDropdown', typeOptions, 'type');
        const resetCountry = setupDropdown('countryDropdown', countryOptions, 'country');
        const resetMarket = setupDropdown('marketDropdown', marketOptions, 'market');
        const resetDiv = setupDropdown('divDropdown', divOptions, 'div');

        function render() {
            const searchTerm = searchInput ? searchInput.value.trim().toUpperCase() : '';

            let html = '';
            const filteredData = tableData.filter(item => {
                const matchesSearch = !searchTerm || item.symbol.toUpperCase().includes(searchTerm);
                const matchesTheme = !filterState.theme || item.theme === filterState.theme;
                const matchesType = !filterState.type || item.type === filterState.type;
                const matchesCountry = !filterState.country || item.country === filterState.country;
                const matchesMarket = !filterState.market || item.market === filterState.market;
                const matchesDiv = !filterState.div || item.div === filterState.div;

                return matchesSearch && matchesTheme && matchesType && matchesCountry && matchesMarket && matchesDiv;
            });

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" style="padding: 24px; text-align: center; color: #777E90;">ไม่พบข้อมูล</td></tr>`;
                return;
            }

            filteredData.forEach((item, index) => {
                const bgColor = index % 2 === 0 ? '#FFFFFF' : '#F4F5F6';

                const getChangeColor = (val) => {
                    if (!val || val === '-') return '#353945';
                    if (val.includes('+')) return '#00B16A';
                    if (val.includes('-')) return '#D92D20';
                    return '#353945';
                };

                const changeColor = getChangeColor(item.change);
                const change1mColor = getChangeColor(item.change1m);
                const change3mColor = getChangeColor(item.change3m);
                const change6mColor = getChangeColor(item.change6m);
                const ytdColor = getChangeColor(item.ytd);

                html += `
                        <tr style="background-color: ${bgColor};">
                             <td style="${cellStyle} ${stickyFirstColStyle} background-color: ${bgColor};">
        <a href="//kenticoweb-test.bualuang.co.th/financial-service/inav-lists/dr/dr01-inav/${item.symbol}"
           target="_blank"
           style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;font-weight:700;">
            <span class="dr-flag-icon flag-${item.flag}"></span>
            <span>${item.symbol}</span>
        </a>
    </td>
                            <td style="${cellStyle} text-align: left; width: 180px; min-width: 180px; max-width: 180px; overflow: hidden; text-overflow: ellipsis;">${item.asset}</td>
                            <td style="${cellStyle} text-align: right;">${item.price}</td>
                            <td style="${cellStyle} text-align: right; color: ${changeColor};">${item.change}</td>
                            <td style="${cellStyle} text-align: right; color: ${change1mColor};">${item.change1m}</td>
                            <td style="${cellStyle} text-align: right; color: ${change3mColor};">${item.change3m}</td>
                            <td style="${cellStyle} text-align: right; color: ${change6mColor};">${item.change6m}</td>
                            <td style="${cellStyle} text-align: right; color: ${ytdColor};">${item.ytd}</td>
                            <td style="${cellStyle}">${item.market}</td>
                            <td style="${cellStyle} text-align: right;">${item.ratio}</td>
                            <td style="${cellStyle} text-align: right;">${item.cap}</td>
                            <td style="${cellStyle} text-align: center;">${item.div}</td>
                            <td style="${cellStyle} text-align: center;">${item.session}</td>
                        </tr>
                    `;
            });
            tbody.innerHTML = html;
        }

        if (searchInput) {
            searchInput.addEventListener('input', render);
        }

        if (mainSearchBtn) {
            mainSearchBtn.addEventListener('click', render);
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                if (searchInput) searchInput.value = '';

                // Reset all custom dropdowns
                resetTheme();
                resetType();
                resetCountry();
                resetMarket();
                resetDiv();

                render();
            });
        }

        render();
    })();
</script>
