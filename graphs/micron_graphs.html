<div style="font-family:'BLS',sans-serif;margin:0;padding:24px 16px;box-sizing:border-box;background:#fff;">

    <!-- Buttons -->
    <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:24px;justify-content:center;">
        <span style="font-size:16px;font-weight:700;color:#0d0d0e;">เปรียบเทียบ</span>

        <button id="btn-underlying" onclick="selectCompareTab('underlying')" style="padding:8px 24px;border-radius:999px;border:1px solid #1565B3;background:#1565B3;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">MICRON</button>
        <button id="btn-dr01" onclick="selectCompareTab('dr01')" style="padding:8px 24px;border-radius:999px;border:1px solid #E6E8ED;background:#fff;color:#777E90;font-size:16px;font-weight:700;cursor:pointer;">MICRON01</button>
        <button id="btn-usdthb" onclick="selectCompareTab('usdthb')" style="padding:8px 24px;border-radius:999px;border:1px solid #E6E8ED;background:#fff;color:#777E90;font-size:16px;font-weight:700;cursor:pointer;">USD/THB</button>
    </div>

    <!-- TradingView Chart -->
    <div id="tv-wrapper" style="display:block;">
        <div id="tv-chart" style="width:100%;height:500px;background:#fff;border-radius:20px;"></div>
    </div>

    <!-- Placeholder -->
    <div id="cta-wrapper" style="display:none;width:100%;height:240px;background:#E9F4FF;border-radius:20px;align-items:center;justify-content:center;">
        <a id="indicative-link" href="#" target="_blank" style="text-decoration:none;">
            <button style="display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;border:2px solid #1565B3;background:#fff;color:#1E90FF;font-size:16px;font-weight:700;cursor:pointer;">
                <span id="indicative-text">ดูราคาอ้างอิง</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M13.5 4.5L21 12M21 12L13.5 19.5M21 12H3" stroke="#1E90FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </a>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tvWidget;
        function createTV(symbol) {
            if (tvWidget && typeof tvWidget.remove === "function") {
                tvWidget.remove();
            }
            tvWidget = new TradingView.widget({
                autosize: true,
                symbol: symbol,
                interval: "D",
                timezone: "Asia/Bangkok",
                theme: "light",
                style: "1",
                locale: "en",
                toolbar_bg: "#f1f3f6",
                enable_publishing: false,
                allow_symbol_change: false,
                container_id: "tv-chart"
            });
        }

        function selectCompareTab(tab) {
            const activeStyle = "padding:8px 24px;border-radius:999px;border:1px solid #1565B3;background:#1565B3;color:#fff;font-size:16px;font-weight:700;cursor:pointer;";
            const inactiveStyle = "padding:8px 24px;border-radius:999px;border:1px solid #E6E8ED;background:#fff;color:#777E90;font-size:16px;font-weight:700;cursor:pointer;";

            const btnUnderlying = document.getElementById("btn-underlying");
            const btnDr01 = document.getElementById("btn-dr01");
            const btnUsdthb = document.getElementById("btn-usdthb");

            const tvWrapper = document.getElementById("tv-wrapper");
            const ctaWrapper = document.getElementById("cta-wrapper");

            const linkElem = document.getElementById("indicative-link");
            const textElem = document.getElementById("indicative-text");

            btnUnderlying.style.cssText = inactiveStyle;
            btnDr01.style.cssText = inactiveStyle;
            btnUsdthb.style.cssText = inactiveStyle;

            if (tab === "underlying") {
                btnUnderlying.style.cssText = activeStyle;
                tvWrapper.style.display = "block";
                ctaWrapper.style.display = "none";
                createTV("NASDAQ:MICRON");
            }
            if (tab === "dr01") {
                btnDr01.style.cssText = activeStyle;
                tvWrapper.style.display = "none";
                ctaWrapper.style.display = "flex";
                textElem.textContent = "ดูราคาอ้างอิง MICRON01";
                linkElem.href = "https://www.tradingview.com/chart/?symbol=MICRON01";
            }
            if (tab === "usdthb") {
                btnUsdthb.style.cssText = activeStyle;
                tvWrapper.style.display = "none";
                ctaWrapper.style.display = "flex";
                textElem.textContent = "ดูราคาอ้างอิง USD/THB";
                linkElem.href = "#";
            }
        }
        // initialize default tab
        selectCompareTab("underlying");
    </script>
</div>
