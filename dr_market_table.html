    function renderDrMarketTable() {
        const tableBody = document.getElementById('dr-market-table-body');
        let html = '';

        drMarketData.forEach((item, index) => {
            const rowBg = index % 2 === 0 ? '#fff' : '#F8F9FA'; // Zebra Striping: Start with white, then gray

            // Helper to determine color based on value (positive green, negative red, neutral black)
            const getColor = (val) => {
                if (val.includes('+')) return '#00C48C';
                if (val.includes('-')) return '#FF4D4F';
                return '#212529';
            };

            html += `
            <tr style="background-color: ${rowBg};">
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; display: flex; align-items: center; gap: 8px;">
                    <img src="${item.flag}" alt="flag" style="width: 20px; height: auto;">
                    <span style="font-family: 'BLS', sans-serif; font-size: 16px; font-weight: 700; color: #1E90FF;">${item.symbol}</span>
                </td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; font-family: 'BLS Text', sans-serif; font-size: 16px; color: #212529;">${item.name}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: #212529;">${item.price}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: ${getColor(item.change)};">${item.change}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: ${getColor(item.m1)};">${item.m1}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: ${getColor(item.m3)};">${item.m3}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: ${getColor(item.m6)};">${item.m6}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: ${getColor(item.ytd)};">${item.ytd}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; font-family: 'BLS Text', sans-serif; font-size: 16px; color: #212529;">${item.market}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: #212529;">${item.ratio}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: right; font-family: 'BLS', sans-serif; font-size: 16px; color: #212529;">${item.marketCap}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; text-align: center; font-family: 'BLS Text', sans-serif; font-size: 16px; color: #212529;">${item.dividend}</td>
                <td style="padding: 16px; border-bottom: 1px solid #E6E8ED; font-family: 'BLS Text', sans-serif; font-size: 16px; color: #212529;">${item.session}</td>
            </tr>
            `;
        });

        tableBody.innerHTML = html;
    }

    // Initialize
